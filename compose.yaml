services:
  aics-frontend:
    build: ./frontend
    ports:
      - '81:81'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - aics-backend
    restart: unless-stopped
    develop:
      watch:
        - action: rebuild
          path: ./frontend
          target: /app

  aics-backend:
    build: ./backend
    environment:
      PORT: 5000
      MONGO_URI: mongodb://aics-mongodb:27017/course-institute
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
      FRONTEND_URL: ${FRONTEND_URL}
    volumes:
      - uploads_data:/uploads
    depends_on:
      aics-mongodb:
        condition: service_healthy
    restart: unless-stopped
    develop:
      watch:
        - action: rebuild
          path: ./backend
          target: /app

  aics-mongodb:
    image: mongo:7
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  aics-tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on:
      - aics-frontend
    restart: unless-stopped

volumes:
  mongodb_data:
  uploads_data:
